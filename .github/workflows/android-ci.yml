# .github/workflows/android-ci.yml
name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  assembleDebug:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME_17: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show Java and Gradle info
        run: |
          java -version
          ./gradlew --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK (capture full log)
        id: build
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --warning-mode all 2>&1 | tee gradle-build.log
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload Gradle build log
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log

      - name: Upload debug APK (if produced)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
