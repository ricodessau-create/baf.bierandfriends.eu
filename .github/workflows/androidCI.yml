name: Android Release CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          # Wir speichern den Keystore direkt im app-Ordner, damit Gradle ihn leicht findet
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > app/release_keystore.jks

      - name: Build APK and Bundle
        env:
          # Diese Umgebungsvariablen werden von der build.gradle gelesen
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BAF-Release-Files
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            
