plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'com.google.gms.google-services' // Firebase
}

android {
    namespace 'baf.bierandfriends.eu'
    compileSdk 34

    defaultConfig {
        applicationId "baf.bierandfriends.eu"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            // Greift auf die Datei zu, die wir im Workflow erstellt haben
            storeFile file("release.keystore")
            // Liest die Passwörter aus den Umgebungsvariablen des Workflows
            storePassword System.getenv("SIGNING_STORE_PASSWORD")
            keyAlias System.getenv("SIGNING_KEY_ALIAS")
            keyPassword System.getenv("SIGNING_KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // WICHTIG: Kein Suffix hier, damit es zur google-services.json passt
        }
        debug {
            // Optional: Wenn du lokal testest, kannst du hier einen Suffix lassen, 
            // aber für den Play Store ist nur der 'release' Block entscheidend.
            applicationIdSuffix ".debug"
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
        dataBinding true
    }
}

dependencies {
    // Deine Abhängigkeiten (Firebase, UI, etc.) bleiben hier gleich
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    // ...
}
